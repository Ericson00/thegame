<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>THE GAME – Münztracker</title>
  <meta name="theme-color" content="#1f2937" />
  <style>
    :root {
      --bg: #f5f5f7;
      --panel: rgba(255,255,255,0.86);
      --panel2: rgba(255,255,255,0.96);
      --text: #111827;
      --muted: #6b7280;
      --line: rgba(15, 23, 42, 0.10);
      --accent: #0a84ff;
      --blue: #0a84ff;
      --green: #16a34a;
      --red: #dc2626;
      --gold: #f59e0b;
      --shadow: 0 8px 24px rgba(62, 47, 24, .14);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: Arial, Helvetica, sans-serif; background: radial-gradient(circle at top, rgba(10,132,255,.08), transparent 28%), radial-gradient(circle at bottom, rgba(52,199,89,.08), transparent 24%), var(--bg); color: var(--text); }
    body { display: flex; justify-content: center; padding: 10px; }
    .app { width: min(100%, 520px); }
    .card { background: var(--panel); border: 2px solid #1f2937; border-radius: 22px; box-shadow: var(--shadow); overflow: hidden; }
    .header { background: linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.45)); color: #111827; padding: 12px 14px; border-bottom: 1px solid rgba(15, 23, 42, 0.08); }
    .headerTop { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .title { font-weight: 900; letter-spacing: .06em; font-size: 14px; text-transform: uppercase; }
    .route { font-size: 12px; padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.2); }
    .scoreWrap { padding: 12px 14px 10px; background: linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,.04)); border-bottom: 1px solid rgba(15, 23, 42, 0.08); text-align: center; }
    .teamName { font-weight: 900; font-size: 22px; letter-spacing: .01em; margin: 0 0 8px; }
    .scoreLabel { font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: .08em; }
    .score { font-size: clamp(52px, 16vw, 86px); line-height: .9; font-weight: 900; color: #111827; margin-top: 6px; }
    .rules { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
    .pill { font-size: 12px; padding: 5px 9px; border-radius: 999px; background: #fff; border: 1px solid var(--line); color: var(--muted); }
    .main { padding: 12px; display: grid; gap: 10px; }
    .teams { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .teamBtn { border: 1px solid rgba(15, 23, 42, 0.10); border-radius: 16px; padding: 11px 8px; background: var(--panel2); font-weight: 900; font-size: 14px; cursor: pointer; color: var(--text); box-shadow: 0 10px 18px rgba(0,0,0,.06); }
    .teamBtn.active { background: rgba(10,132,255,.12); color: #0057b8; }
    .block { background: var(--panel2); border: 1px solid rgba(15, 23, 42, 0.10); border-radius: var(--radius); padding: 10px; box-shadow: 0 10px 18px rgba(0,0,0,.05); }
    .block h2 { margin: 0 0 8px; font-size: 13px; letter-spacing: .05em; text-transform: uppercase; color: var(--accent); }
    .inlineAction { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
    input[type="number"] { width: 100%; min-height: 46px; border-radius: 14px; border: 1px solid rgba(15, 23, 42, 0.12); background: #fff; font-size: 22px; font-weight: 800; padding: 10px 12px; appearance: textfield; }
    input::placeholder { color: #9ca3af; }
    .actions2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .actions1 { margin-top: 8px; }
    button { min-height: 46px; border-radius: 14px; border: 1px solid rgba(15, 23, 42, 0.12); font-weight: 900; font-size: 15px; cursor: pointer; color: #111827; background: rgba(255,255,255,.92); box-shadow: 0 10px 18px rgba(0,0,0,.06); }
    button:active { transform: translateY(1px); }
    .bahn { background: #ffffff; }
    .bus { background: #e7f5ff; }
    .add { background: #ffffff; }
    .sub { background: #ffffff; }
    .reset0 { background: #ffffff; }
    .reset250 { background: rgba(10,132,255,.12); color: #0057b8; }
    .footer { padding: 10px 14px 14px; color: var(--muted); font-size: 12px; text-align: center; }
    @media (max-width: 420px) {
      .teams, .actions2 { grid-template-columns: 1fr; }
      .inlineAction { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="header">
        <div class="headerTop">
          <div class="title">THE GAME – Münztracker</div>
          <div class="route" id="routeInfo">LEo</div>
        </div>
      </div>

      <div class="scoreWrap">
        <h1 class="teamName" id="teamName">LEo</h1>
        <div class="scoreLabel">Aktuelle Münzen</div>
        <div class="score" id="score">250</div>
        <div class="rules">
          <span class="pill">Start 250</span>
          <span class="pill">Bahn 50/min</span>
          <span class="pill">Bus 25/min</span>
        </div>
      </div>

      <div class="main">
        <div class="teams">
          <button class="teamBtn active" id="team1Btn">LEo</button>
          <button class="teamBtn" id="team2Btn">Annika</button>
        </div>

        <div class="block">
          <h2>Bus</h2>
          <div class="inlineAction">
            <input id="busMinutes" type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1" placeholder="Minuten" />
            <button class="bus" id="busBtn">Buchen</button>
          </div>
        </div>

        <div class="block">
          <h2>Bahn</h2>
          <div class="inlineAction">
            <input id="bahnMinutes" type="number" inputmode="numeric" pattern="[0-9]*" min="0" step="1" placeholder="Minuten" />
            <button class="bahn" id="bahnBtn">Buchen</button>
          </div>
        </div>

        <div class="block">
          <h2>Challenge / Korrektur</h2>
          <input id="challengeValue" type="number" inputmode="numeric" pattern="-?[0-9]*" step="1" placeholder="Punkte" />
          <div class="actions2">
            <button class="add" id="challengeAddBtn">Hinzufügen</button>
            <button class="sub" id="challengeSubBtn">Abziehen</button>
          </div>
        </div>

        <div class="actions2">
          <button class="reset0" id="reset0Btn">0</button>
          <button class="reset250" id="reset250Btn">250</button>
        </div>
      </div>

      <div class="footer">0 setzt nur das ausgewählte Team zurück. 250 setzt beide Teams auf Startwert.</div>
    </section>
  </main>

  <script>
    const START_COINS = 250;
    const COST_BAHN = 50;
    const COST_BUS = 25;
    const store = {
      '1': { score: START_COINS, lastAction: 'Startwert gesetzt', updatedAt: '–' },
      '2': { score: START_COINS, lastAction: 'Startwert gesetzt', updatedAt: '–' }
    };
    let currentTeam = '1';

    const el = {
      score: document.getElementById('score'),
      teamName: document.getElementById('teamName'),
      routeInfo: document.getElementById('routeInfo'),
      team1Btn: document.getElementById('team1Btn'),
      team2Btn: document.getElementById('team2Btn'),
      bahnMinutes: document.getElementById('bahnMinutes'),
      busMinutes: document.getElementById('busMinutes'),
      challengeValue: document.getElementById('challengeValue')
    };

    function nowText() {
      return new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    function saveState() {
      localStorage.setItem('thegame_muenztracker', JSON.stringify(store));
    }
    async function saveServer() {
      try { await fetch('/state', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(store) }); } catch (e) {}
    }
    async function loadState() {
      try {
        const res = await fetch('/state');
        if (!res.ok) return;
        const data = await res.json();
        ['1','2'].forEach(g => {
          if (data[g] && Number.isFinite(data[g].score)) store[g].score = data[g].score;
          if (data[g] && typeof data[g].lastAction === 'string') store[g].lastAction = data[g].lastAction;
          if (data[g] && typeof data[g].updatedAt === 'string') store[g].updatedAt = data[g].updatedAt;
        });
      } catch (e) {}
    }
    function syncAll() { saveState(); saveServer(); }
    function render() {
      const data = store[currentTeam];
      el.score.textContent = data.score;
      el.teamName.textContent = currentTeam === '1' ? 'LEo' : 'Annika';
      el.routeInfo.textContent = currentTeam === '1' ? 'LEo' : 'Annika';
      el.team1Btn.classList.toggle('active', currentTeam === '1');
      el.team2Btn.classList.toggle('active', currentTeam === '2');
    }
    function parseIntSafe(v) { const n = parseInt(v, 10); return Number.isFinite(n) ? n : 0; }
    function clearField(i) { i.value = ''; i.blur(); }
    function updateScore(delta, actionText) {
      store[currentTeam].score += delta;
      store[currentTeam].lastAction = actionText;
      store[currentTeam].updatedAt = nowText();
      syncAll();
      render();
    }
    function resetSelectedToZero() {
      store[currentTeam].score = 0;
      store[currentTeam].lastAction = 'Manuell zurückgesetzt auf 0';
      store[currentTeam].updatedAt = nowText();
      syncAll();
      render();
    }
    function resetBothTo250() {
      store['1'].score = START_COINS;
      store['2'].score = START_COINS;
      store['1'].lastAction = 'Auf 250 gesetzt';
      store['2'].lastAction = 'Auf 250 gesetzt';
      store['1'].updatedAt = nowText();
      store['2'].updatedAt = nowText();
      syncAll();
      render();
    }

    document.getElementById('team1Btn').addEventListener('click', () => { currentTeam = '1'; render(); });
    document.getElementById('team2Btn').addEventListener('click', () => { currentTeam = '2'; render(); });

    document.getElementById('bahnBtn').addEventListener('click', () => {
      const mins = parseIntSafe(el.bahnMinutes.value);
      if (mins <= 0) return el.bahnMinutes.focus();
      updateScore(-(mins * COST_BAHN), `${mins} min Bahn: -${mins * COST_BAHN}`);
      clearField(el.bahnMinutes);
    });
    document.getElementById('busBtn').addEventListener('click', () => {
      const mins = parseIntSafe(el.busMinutes.value);
      if (mins <= 0) return el.busMinutes.focus();
      updateScore(-(mins * COST_BUS), `${mins} min Bus: -${mins * COST_BUS}`);
      clearField(el.busMinutes);
    });
    document.getElementById('challengeAddBtn').addEventListener('click', () => {
      const val = Math.abs(parseIntSafe(el.challengeValue.value));
      if (val <= 0) return el.challengeValue.focus();
      updateScore(val, `Challenge: +${val}`);
      clearField(el.challengeValue);
    });
    document.getElementById('challengeSubBtn').addEventListener('click', () => {
      const val = Math.abs(parseIntSafe(el.challengeValue.value));
      if (val <= 0) return el.challengeValue.focus();
      updateScore(-val, `Korrektur: -${val}`);
      clearField(el.challengeValue);
    });
    document.getElementById('reset0Btn').addEventListener('click', resetSelectedToZero);
    document.getElementById('reset250Btn').addEventListener('click', resetBothTo250);

    window.addEventListener('hashchange', () => {
      currentTeam = location.hash.includes('/2') ? '2' : '1';
      render();
    });
    if (!location.hash) location.hash = '#/1';
    currentTeam = location.hash.includes('/2') ? '2' : '1';
    loadState().then(render);
  </script>
</body>
</html>
